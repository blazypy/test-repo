name: Test

on:
  workflow_dispatch:
    
permissions:
  contents: read
  
  
jobs:
  test:
    runs-on: ubuntu-latest #24.04-arm
    env:
       CONFIG : ${{ vars.CONFIG }}
       SETUP_CMD : ${{ vars.SETUP_CMD }}
       
    steps:
    - name: Checkout code
      uses: actions/checkout@v2 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12.0

    - name: install dependencies
      run: |
        pip install flask
        
    - name: Run Test
      run : |
        python test.py
        #${{ vars.SETUP_CMD }}
 
